<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UX4G Eyedropper</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px; background: #fff; color: #1e1e1e; }
    #pick { font-size: 15px; padding: 10px 16px; border: 0; border-radius: 8px; background: #6A4EFF; color: #fff; cursor: pointer; width: 100%; }
    #status { font-size: 12px; color: #6b6b6b; margin-top: 10px; line-height: 1.5; word-break: break-word; }
    .err { color: #c0392b; }
  </style>
</head>
<body>
  <button id="pick">Pick a colour</button>
  <div id="status"></div>
  <script>
    (function () {
      var statusEl = document.getElementById('status');
      var btn = document.getElementById('pick');
      var hasED = (typeof window.EyeDropper === 'function');
      function setStatus(t, isErr) { statusEl.textContent = t; statusEl.className = isErr ? 'err' : ''; }
      function back(msg) { try { if (window.opener) window.opener.postMessage(msg, '*'); } catch (e) {} }

      setStatus('secureContext=' + window.isSecureContext + ' · EyeDropper=' + (hasED ? 'yes' : 'no') + ' · opener=' + (window.opener ? 'yes' : 'no'));

      async function pick() {
        if (typeof window.EyeDropper !== 'function') {
          setStatus('EyeDropper unavailable here (secureContext=' + window.isSecureContext + ')', true);
          return;
        }
        try {
          var ed = new window.EyeDropper();
          var res = await ed.open();
          var hex = String(res.sRGBHex || '').toUpperCase();
          if (/^#[0-9A-F]{6}$/.test(hex)) { back({ type: 'eyedropper-result', hex: hex }); window.close(); }
        } catch (e) { setStatus('Cancelled or failed: ' + (e && e.message ? e.message : e), true); }
      }
      btn.addEventListener('click', pick);
      // Try once automatically in case the click activation carried through window.open (1-click UX).
      if (hasED) pick();
    })();
  </script>
</body>
</html>
